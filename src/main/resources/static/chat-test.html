<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>채팅 테스트 - NovelCraft</title>
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@6/bundles/stomp.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; height: 100vh; display: flex; flex-direction: column; }

    /* ── 헤더 ── */
    .header {
      background: #4f46e5; color: #fff; padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15); flex-shrink: 0;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 12px; font-size: 14px; }
    .badge {
      background: rgba(255,255,255,0.2); padding: 4px 10px;
      border-radius: 20px; font-size: 12px;
    }
    .btn-logout {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      color: #fff; padding: 6px 14px; border-radius: 6px; cursor: pointer;
      font-size: 13px; transition: background .15s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.25); }

    /* ── 메인 레이아웃 ── */
    .main { flex: 1; display: flex; overflow: hidden; }

    /* ── 로그인 화면 ── */
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      width: 100%; background: #f0f2f5;
    }
    .login-card {
      background: #fff; border-radius: 16px; padding: 40px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1); width: 360px;
    }
    .login-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #1e1b4b; }
    .login-card p { font-size: 13px; color: #888; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
    input[type="email"], input[type="password"] {
      width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 14px; outline: none; transition: border-color .2s;
    }
    input:focus { border-color: #4f46e5; }
    .quick-accounts { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .quick-btn {
      flex: 1; min-width: 140px; padding: 8px; background: #f8f7ff;
      border: 1px solid #e0e0ff; border-radius: 8px; cursor: pointer;
      font-size: 12px; text-align: center; transition: all .15s;
    }
    .quick-btn:hover { background: #ede9ff; border-color: #4f46e5; }
    .quick-btn strong { display: block; font-size: 13px; color: #4f46e5; margin-bottom: 2px; }
    .btn-primary {
      width: 100%; padding: 12px; background: #4f46e5; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }

    /* ── 채팅방 목록 사이드바 ── */
    #sidebar {
      width: 280px; background: #fff; border-right: 1px solid #e5e7eb;
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-header {
      padding: 16px 20px; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-header h3 { font-size: 15px; font-weight: 600; color: #374151; }
    .btn-refresh {
      background: none; border: none; cursor: pointer; color: #9ca3af;
      font-size: 18px; padding: 4px; border-radius: 6px; transition: color .15s;
    }
    .btn-refresh:hover { color: #4f46e5; }
    .room-list { flex: 1; overflow-y: auto; }
    .room-item {
      padding: 14px 20px; border-bottom: 1px solid #f9f9f9; cursor: pointer;
      transition: background .15s; display: flex; align-items: center; gap: 12px;
    }
    .room-item:hover { background: #f8f7ff; }
    .room-item.active { background: #ede9ff; border-left: 3px solid #4f46e5; }
    .room-avatar {
      width: 40px; height: 40px; border-radius: 50%; background: #e0e7ff;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .room-info { flex: 1; min-width: 0; }
    .room-title { font-size: 14px; font-weight: 600; color: #1f2937; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .room-sub { font-size: 12px; color: #9ca3af; margin-top: 2px; }
    .room-empty { padding: 40px 20px; text-align: center; color: #9ca3af; font-size: 14px; }
    .unread-badge {
      min-width: 20px; height: 20px; background: #ef4444; color: #fff;
      border-radius: 10px; font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px; flex-shrink: 0;
    }

    /* 채팅방 생성 패널 */
    .create-panel {
      padding: 12px 16px; border-top: 1px solid #f0f0f0; background: #fafafa;
    }
    .create-panel label { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
    .create-row { display: flex; gap: 8px; }
    .create-input {
      flex: 1; padding: 8px 10px; border: 1px solid #e2e8f0;
      border-radius: 6px; font-size: 13px; outline: none;
    }
    .create-input:focus { border-color: #4f46e5; }
    .btn-create {
      padding: 8px 14px; background: #4f46e5; color: #fff; border: none;
      border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap;
      transition: background .15s;
    }
    .btn-create:hover { background: #4338ca; }

    /* ── 채팅 영역 ── */
    #chatArea {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    .chat-header {
      padding: 14px 20px; background: #fff; border-bottom: 1px solid #e5e7eb;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .chat-header-info h3 { font-size: 16px; font-weight: 600; }
    .chat-header-info p { font-size: 12px; color: #9ca3af; margin-top: 2px; }
    .btn-leave {
      padding: 6px 14px; background: #fff; border: 1.5px solid #ef4444;
      color: #ef4444; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .btn-leave:hover { background: #ef4444; color: #fff; }

    .ws-status {
      font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 500;
    }
    .ws-status.connected { background: #d1fae5; color: #065f46; }
    .ws-status.disconnected { background: #fee2e2; color: #991b1b; }
    .ws-status.connecting { background: #fef3c7; color: #92400e; }

    /* 메시지 목록 */
    .messages-wrap {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .msg-row { display: flex; gap: 8px; max-width: 70%; }
    .msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.theirs { align-self: flex-start; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #e0e7ff; display: flex; align-items: center;
      justify-content: center; font-size: 14px; flex-shrink: 0; align-self: flex-end;
    }
    .msg-bubble-wrap { display: flex; flex-direction: column; }
    .msg-row.mine .msg-bubble-wrap { align-items: flex-end; }
    .msg-sender { font-size: 11px; color: #9ca3af; margin-bottom: 3px; }
    .msg-bubble {
      padding: 10px 14px; border-radius: 18px; font-size: 14px;
      line-height: 1.5; word-break: break-word; max-width: 300px;
    }
    .msg-row.mine .msg-bubble { background: #4f46e5; color: #fff; border-bottom-right-radius: 4px; }
    .msg-row.theirs .msg-bubble { background: #f3f4f6; color: #1f2937; border-bottom-left-radius: 4px; }
    .msg-time { font-size: 10px; color: #d1d5db; margin-top: 4px; }
    .msg-row.theirs .msg-time { color: #9ca3af; }

    /* 입력창 */
    .input-area {
      padding: 16px 20px; background: #fff; border-top: 1px solid #e5e7eb;
      display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
    }
    #msgInput {
      flex: 1; padding: 10px 16px; border: 1.5px solid #e2e8f0;
      border-radius: 24px; font-size: 14px; outline: none; resize: none;
      max-height: 100px; transition: border-color .2s; font-family: inherit;
    }
    #msgInput:focus { border-color: #4f46e5; }
    .btn-file {
      width: 44px; height: 44px; border-radius: 50%; background: #f3f4f6;
      color: #6b7280; border: 1.5px solid #e2e8f0; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; flex-shrink: 0;
    }
    .btn-file:hover { background: #ede9ff; color: #4f46e5; border-color: #4f46e5; }
    .btn-file:disabled { background: #f9fafb; color: #d1d5db; cursor: not-allowed; }
    .btn-send {
      width: 44px; height: 44px; border-radius: 50%; background: #4f46e5;
      color: #fff; border: none; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s; flex-shrink: 0;
    }
    .btn-send:hover { background: #4338ca; }
    .btn-send:disabled { background: #a5b4fc; cursor: not-allowed; }
    .file-preview {
      padding: 8px 12px; background: #f3f4f6; border-radius: 8px;
      font-size: 12px; color: #6b7280; display: flex; align-items: center;
      gap: 8px; margin-bottom: 8px;
    }
    .file-preview button {
      background: none; border: none; cursor: pointer; color: #ef4444;
      font-size: 16px; padding: 0;
    }
    .msg-file-link {
      color: #4f46e5; text-decoration: underline; cursor: pointer;
    }
    .msg-file-img {
      max-width: 200px; border-radius: 8px; margin-top: 6px; cursor: pointer;
    }

    /* 빈 채팅 화면 */
    .chat-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: #9ca3af;
    }
    .chat-empty .icon { font-size: 56px; margin-bottom: 16px; }
    .chat-empty p { font-size: 15px; }

    /* 로딩 */
    .loading { text-align: center; color: #9ca3af; font-size: 13px; padding: 16px; }
    .scroll-top-btn {
      margin: 0 auto 8px; display: block; background: #f3f4f6;
      border: 1px solid #e2e8f0; border-radius: 20px; padding: 6px 16px;
      font-size: 12px; color: #6b7280; cursor: pointer; transition: all .15s;
    }
    .scroll-top-btn:hover { background: #ede9ff; color: #4f46e5; }

    /* 앱 숨김 */
    #appScreen { display: none; flex: 1; overflow: hidden; }
    #appScreen.show { display: flex; flex-direction: column; }
  </style>
</head>
<body>

<!-- ────────── 로그인 화면 ────────── -->
<div id="loginScreen">
  <div class="login-card">
    <h2>💬 NovelCraft 채팅</h2>
    <p>로그인하여 멘토링 채팅을 시작하세요</p>

    <p style="font-size:12px;color:#9ca3af;margin-bottom:8px;">빠른 로그인</p>
    <div class="quick-accounts">
      <div class="quick-btn" onclick="quickLogin('mentor@test.com','asdf1234')">
        <strong>🧑‍🏫 정민준</strong>
        mentor@test.com<br>(멘토 / AUTHOR)
      </div>
      <div class="quick-btn" onclick="quickLogin('mentee@test.com','asdf1234')">
        <strong>📚 한예린</strong>
        mentee@test.com<br>(멘티 / AUTHOR)
      </div>
    </div>

    <div class="form-group">
      <label>이메일</label>
      <input type="email" id="loginEmail" placeholder="email@test.com" />
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="loginPassword" placeholder="asdf1234"
             onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
    <div id="loginError" style="color:#ef4444;font-size:13px;margin-bottom:12px;display:none;"></div>
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">로그인</button>
  </div>
</div>

<!-- ────────── 앱 화면 ────────── -->
<div id="appScreen">
  <!-- 헤더 -->
  <div class="header">
    <h1>💬 NovelCraft 채팅</h1>
    <div class="header-right">
      <span id="userNickname" class="badge">–</span>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="main">
    <!-- 사이드바 -->
    <div id="sidebar">
      <div class="sidebar-header">
        <h3>채팅방 목록</h3>
        <button class="btn-refresh" onclick="loadRooms()" title="새로고침">↻</button>
      </div>

      <div class="room-list" id="roomList">
        <div class="room-empty">채팅방을 불러오는 중...</div>
      </div>

      <div class="create-panel">
        <label>멘토십 ID로 채팅방 열기</label>
        <div class="create-row">
          <input class="create-input" type="number" id="mentorshipIdInput" placeholder="멘토십 ID (예: 1)" />
          <button class="btn-create" onclick="openRoomByMentorship()">열기</button>
        </div>
        <label style="margin-top:10px;display:block;">유저 ID로 채팅방 찾기</label>
        <div class="create-row">
          <input class="create-input" type="number" id="userIdInput" placeholder="멘토 또는 멘티 ID" />
          <button class="btn-create" onclick="openRoomByUserId()">찾기</button>
        </div>
      </div>
    </div>

    <!-- 채팅 영역 -->
    <div id="chatArea">
      <div class="chat-empty" id="chatEmpty">
        <div class="icon">💬</div>
        <p>채팅방을 선택하세요</p>
      </div>

      <div id="chatMain" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
        <div class="chat-header">
          <div class="chat-header-info">
            <h3 id="chatRoomTitle">채팅방</h3>
            <p id="chatRoomSub"></p>
          </div>
          <div style="display:flex; align-items:center; gap:10px;">
            <span class="ws-status disconnected" id="wsStatus">● 연결 끊김</span>
            <button class="btn-leave" onclick="leaveChatRoom()">나가기</button>
          </div>
        </div>

        <div class="messages-wrap" id="messageList">
          <!-- 이전 메시지 더 보기 -->
        </div>

        <div class="input-area">
          <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)" />
          <button class="btn-file" id="fileBtn" onclick="document.getElementById('fileInput').click()" disabled title="파일 첨부">📎</button>
          <textarea id="msgInput" rows="1" placeholder="메시지를 입력하세요..."
                    oninput="autoResize(this)">
          </textarea>
          <button class="btn-send" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────
//  상태
// ──────────────────────────────────────────
let token       = null;
let myUserId    = null;
let myNickname  = null;
let currentRoom = null;   // { id, mentorId, menteeId }
let stompClient = null;
let currentPage = 0;
let totalPages  = 1;
let loadingMore = false;

// ──────────────────────────────────────────
//  로그인 / 로그아웃
// ──────────────────────────────────────────
function quickLogin(email, pw) {
  document.getElementById('loginEmail').value = email;
  document.getElementById('loginPassword').value = pw;
  doLogin();
}

async function doLogin() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  const errEl    = document.getElementById('loginError');
  const btnEl    = document.getElementById('loginBtn');

  if (!email || !password) { showLoginError('이메일과 비밀번호를 입력하세요.'); return; }

  errEl.style.display = 'none';
  btnEl.disabled = true;
  btnEl.textContent = '로그인 중...';

  try {
    const res  = await api('/api/auth/login', 'POST', { email, password }, false);
    // 서버가 "Bearer eyJ..." 형태로 반환 → 그대로 저장
    token      = res.data.accessToken;
    myNickname = res.data.nickname;

    // JWT payload에서 userId(sub = email) 대신 이메일로 users/me 조회
    // 단, token에 Bearer 접두사가 있으므로 Authorization 헤더를 token 그대로 사용
    const me  = await api('/api/auth/users/me', 'GET');
    // MyPageResponse 필드명이 uerId (오타)이므로 모든 경우 대비
    const d   = me.data || {};
    myUserId  = Number(d.uerId ?? d.userId ?? d.id ?? 0) || null;
    console.log('[LOGIN] myUserId =', myUserId, '/ me.data keys =', Object.keys(d));

    document.getElementById('userNickname').textContent = myNickname;
    document.getElementById('loginScreen').style.display = 'none';
    const app = document.getElementById('appScreen');
    app.style.display = 'flex';
    app.classList.add('show');
    await loadRooms();
  } catch (e) {
    showLoginError(e.message || '로그인에 실패했습니다.');
  } finally {
    btnEl.disabled = false;
    btnEl.textContent = '로그인';
  }
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
}

function doLogout() {
  disconnectWs();
  token = myUserId = myNickname = currentRoom = null;
  document.getElementById('appScreen').classList.remove('show');
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('messageList').innerHTML = '';
}

// ──────────────────────────────────────────
//  채팅방 목록
// ──────────────────────────────────────────
async function loadRooms() {
  const listEl = document.getElementById('roomList');
  listEl.innerHTML = '<div class="room-empty">불러오는 중...</div>';
  try {
    const res  = await api('/api/chatrooms', 'GET');
    const rooms = res.data || [];
    if (rooms.length === 0) {
      listEl.innerHTML = '<div class="room-empty">참여 중인 채팅방이 없습니다.<br>아래에서 멘토십 ID로 채팅방을 여세요.</div>';
      return;
    }
    listEl.innerHTML = '';
    rooms.forEach(room => renderRoomItem(room, listEl));
  } catch (e) {
    listEl.innerHTML = `<div class="room-empty" style="color:#ef4444">${e.message}</div>`;
  }
}

function renderRoomItem(room, container) {
  const div    = document.createElement('div');
  const isMe   = Number(room.menteeId) === Number(myUserId);
  const label  = isMe ? '멘토와의 채팅' : '멘티와의 채팅';
  const subId  = isMe ? `멘토 ID: ${room.mentorId}` : `멘티 ID: ${room.menteeId}`;
  const unread = room.unreadCount || 0;
  div.className = 'room-item' + (currentRoom?.id === room.id ? ' active' : '');
  div.dataset.roomId = room.id;
  div.innerHTML = `
    <div class="room-avatar">💬</div>
    <div class="room-info">
      <div class="room-title">${label}</div>
      <div class="room-sub">채팅방 #${room.id} · ${subId}</div>
    </div>
    ${unread > 0 ? `<div class="unread-badge">${unread > 99 ? '99+' : unread}</div>` : ''}`;
  div.onclick = () => openRoom(room);
  container.appendChild(div);
}

// ──────────────────────────────────────────
//  채팅방 열기
// ──────────────────────────────────────────
async function leaveChatRoom() {
  if (!currentRoom) return;
  if (!confirm(`채팅방 #${currentRoom.id}에서 나가시겠습니까?\n나가면 내 목록에서만 제거되며, 상대방의 대화 내용은 유지됩니다.`)) return;

  try {
    await api(`/api/chatrooms/${currentRoom.id}/leave`, 'DELETE');
    disconnectWs();

    // 사이드바에서 해당 방 제거
    const item = document.querySelector(`.room-item[data-room-id="${currentRoom.id}"]`);
    if (item) item.remove();

    // 채팅 패널 초기화
    currentRoom = null;
    document.getElementById('chatMain').style.display = 'none';
    document.getElementById('chatEmpty').style.display = 'flex';
    document.getElementById('messageList').innerHTML = '';

    // 방이 0개면 빈 목록 문구 표시
    const listEl = document.getElementById('roomList');
    if (!listEl.querySelector('.room-item')) {
      listEl.innerHTML = '<div class="room-empty">참여 중인 채팅방이 없습니다.<br>아래에서 멘토십 ID로 채팅방을 여세요.</div>';
    }
  } catch (e) {
    alert('채팅방 나가기 실패: ' + e.message);
  }
}

async function openRoomByMentorship() {
  const id = document.getElementById('mentorshipIdInput').value.trim();
  if (!id) { alert('멘토십 ID를 입력하세요.'); return; }
  try {
    const res = await api(`/api/chatrooms?mentorshipId=${id}`, 'POST');
    await loadRooms();
    openRoom(res.data);
  } catch (e) {
    alert('채팅방 열기 실패: ' + e.message);
  }
}

async function openRoomByUserId() {
  const userId = Number(document.getElementById('userIdInput').value.trim());
  if (!userId) { alert('유저 ID를 입력하세요.'); return; }

  // 이미 불러온 방 목록에서 mentorId 또는 menteeId가 일치하는 방 검색
  try {
    const res   = await api('/api/chatrooms', 'GET');
    const rooms = res.data || [];
    const found = rooms.find(r => Number(r.mentorId) === userId || Number(r.menteeId) === userId);
    if (!found) {
      alert(`유저 ID ${userId}와 연결된 채팅방이 없습니다.`);
      return;
    }
    // 목록 재렌더 후 해당 방 열기
    const listEl = document.getElementById('roomList');
    listEl.innerHTML = '';
    rooms.forEach(room => renderRoomItem(room, listEl));
    openRoom(found);
  } catch (e) {
    alert('채팅방 검색 실패: ' + e.message);
  }
}

async function openRoom(room) {
  currentRoom   = room;
  currentPage   = 0;
  totalPages    = 1;

  // 사이드바 활성화 표시
  document.querySelectorAll('.room-item').forEach(el => {
    el.classList.toggle('active', el.dataset.roomId === String(room.id));
  });

  // 채팅 패널 표시
  document.getElementById('chatEmpty').style.display = 'none';
  const chatMain = document.getElementById('chatMain');
  chatMain.style.display = 'flex';

  const isMe = Number(room.menteeId) === Number(myUserId);
  document.getElementById('chatRoomTitle').textContent = isMe ? '멘토와의 채팅' : '멘티와의 채팅';
  document.getElementById('chatRoomSub').textContent  = `채팅방 #${room.id} · 멘토십 #${room.mentorshipId}`;

  // 메시지 초기화 후 로드
  const listEl = document.getElementById('messageList');
  listEl.innerHTML = '<div class="loading">메시지 로딩 중...</div>';
  await loadMessages(true);

  // 읽음 처리 + 사이드바 뱃지 초기화
  api(`/api/chatrooms/${room.id}/read`, 'PATCH')
    .then(() => clearUnreadBadge(room.id))
    .catch(() => {});

  // WebSocket 연결
  connectWs(room.id);
}

// ──────────────────────────────────────────
//  메시지 히스토리 (페이지)
// ──────────────────────────────────────────
async function loadMessages(initial = false) {
  if (loadingMore || currentPage >= totalPages) return;
  loadingMore = true;

  const listEl = document.getElementById('messageList');
  if (initial) listEl.innerHTML = '<div class="loading">메시지 로딩 중...</div>';

  try {
    const res = await api(`/api/chatrooms/${currentRoom.id}/messages?page=${currentPage}&size=30`);
    totalPages = res.data.totalPages;

    const msgs = (res.data.content || []).reverse();

    if (initial) listEl.innerHTML = '';

    // 기존 버튼 제거
    const existingBtn = listEl.querySelector('.scroll-top-btn');
    if (existingBtn) existingBtn.remove();

    const scrollBottom = listEl.scrollHeight - listEl.scrollTop;
    const insertBefore = listEl.firstChild;

    msgs.forEach(msg => {
      const el = buildMsgEl(msg);
      if (initial) listEl.appendChild(el);
      else listEl.insertBefore(el, insertBefore);
    });

    currentPage++;

    // 더 불러올 페이지가 있으면 버튼 추가
    if (currentPage < totalPages) {
      const btn = document.createElement('button');
      btn.className = 'scroll-top-btn';
      btn.textContent = '이전 메시지 더 보기';
      btn.onclick = () => loadMessages();
      listEl.prepend(btn);
    }

    if (initial) listEl.scrollTop = listEl.scrollHeight;
    else listEl.scrollTop = listEl.scrollHeight - scrollBottom;

  } catch (e) {
    if (initial) listEl.innerHTML = `<div class="loading" style="color:#ef4444">메시지 로딩 실패: ${e.message}</div>`;
  } finally {
    loadingMore = false;
  }
}

function buildMsgEl(msg) {
  const isMine = Number(msg.senderId) === Number(myUserId);
  const row    = document.createElement('div');
  row.className = 'msg-row ' + (isMine ? 'mine' : 'theirs');
  row.dataset.msgId = msg.id;

  const time = msg.createdAt ? formatTime(msg.createdAt) : '';

  let contentHtml = '';

  if (msg.messageType === 'FILE' && msg.fileUrl) {
    const safeUrl = sanitizeFileUrl(msg.fileUrl);
    if (!safeUrl) {
      contentHtml = '⚠️ 유효하지 않은 파일 URL';
    } else {
      const fileName = msg.content || '첨부파일';
      const isImage = /\.(jpg|jpeg|png|gif)$/i.test(safeUrl);

      if (isImage) {
        // 이미지 파일은 썸네일로 표시 (XSS 방지: onclick 제거, a 태그로 감싸기)
        contentHtml = `
          <div>${escHtml(fileName)}</div>
          <a href="${safeUrl}" target="_blank" rel="noopener noreferrer">
            <img src="${safeUrl}" class="msg-file-img" alt="${escHtml(fileName)}" />
          </a>`;
      } else {
        // 문서 파일은 링크로 표시
        contentHtml = `
          📄 <a href="${safeUrl}" target="_blank" rel="noopener noreferrer" class="msg-file-link">${escHtml(fileName)}</a>`;
      }
    }
  } else {
    // 일반 텍스트 메시지
    contentHtml = escHtml(msg.content);
  }

  row.innerHTML = `
    <div class="msg-avatar">${isMine ? '🙋' : '🧑‍🏫'}</div>
    <div class="msg-bubble-wrap">
      ${!isMine ? `<div class="msg-sender">ID: ${msg.senderId}</div>` : ''}
      <div class="msg-bubble">${contentHtml}</div>
      <div class="msg-time">${time}${isMine && msg.isRead ? ' ✓' : ''}</div>
    </div>`;
  return row;
}

// ──────────────────────────────────────────
//  WebSocket (STOMP)
// ──────────────────────────────────────────
function connectWs(roomId) {
  disconnectWs();
  setWsStatus('connecting');

  stompClient = new StompJs.Client({
    brokerURL: `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/ws-chat`,
    connectHeaders: { Authorization: token },
    reconnectDelay: 5000,
    onConnect: () => {
      setWsStatus('connected');
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('fileBtn').disabled = false;

      stompClient.subscribe('/user/queue/errors', frame => {
        appendSystemMsg('오류: ' + frame.body);
      });

      stompClient.subscribe(`/topic/chat/${roomId}`, frame => {
        const event = JSON.parse(frame.body);

        if (event.eventType === 'MESSAGE') {
          appendRealtimeMsg(event.message);
          // 상대방 메시지 → 즉시 읽음 처리
          if (Number(event.userId) !== Number(myUserId)) {
            api(`/api/chatrooms/${roomId}/read`, 'PATCH')
              .then(() => clearUnreadBadge(roomId))
              .catch(() => {});
          }

        } else if (event.eventType === 'READ') {
          // 상대방이 읽음 → 내가 보낸 메시지에 ✓ 실시간 반영 (Fix 2)
          if (Number(event.userId) !== Number(myUserId)) {
            markSentMessagesAsRead();
          }

        } else if (event.eventType === 'LEAVE') {
          // 상대방이 나감 → 시스템 메시지 표시 (Fix 3)
          if (Number(event.userId) !== Number(myUserId)) {
            appendSystemMsg('상대방이 채팅방을 나갔습니다.');
          }
        }
      });
    },
    onDisconnect: () => {
      setWsStatus('disconnected');
      document.getElementById('sendBtn').disabled = true;
      document.getElementById('fileBtn').disabled = true;
    },
    onStompError: frame => {
      console.error('STOMP error', frame);
      setWsStatus('disconnected');
    }
  });

  stompClient.activate();
}

function disconnectWs() {
  if (stompClient) {
    stompClient.deactivate();
    stompClient = null;
  }
  setWsStatus('disconnected');
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('fileBtn').disabled = true;
}

function setWsStatus(state) {
  const el = document.getElementById('wsStatus');
  if (!el) return;
  const map = {
    connected:    ['● 연결됨',    'connected'],
    disconnected: ['● 연결 끊김', 'disconnected'],
    connecting:   ['● 연결 중…',  'connecting'],
  };
  const [text, cls] = map[state] || map.disconnected;
  el.textContent = text;
  el.className   = `ws-status ${cls}`;
}

// ──────────────────────────────────────────
//  메시지 전송
// ──────────────────────────────────────────
function sendMessage() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text || !stompClient?.connected || !currentRoom) return;

  stompClient.publish({
    destination: `/app/chat/${currentRoom.id}`,
    body: JSON.stringify({ content: text, messageType: 'TEXT' })
  });

  input.value = '';
  input.style.height = 'auto';
}

// ──────────────────────────────────────────
//  파일 업로드
// ──────────────────────────────────────────
async function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;

  // 파일 크기 검증 (10MB)
  const MAX_SIZE = 10 * 1024 * 1024;
  if (file.size > MAX_SIZE) {
    alert('파일 크기는 최대 10MB까지 가능합니다.');
    event.target.value = '';
    return;
  }

  // 허용 파일 타입 검증
  const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'application/pdf', 'text/plain',
    'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'];

  if (!allowedTypes.includes(file.type)) {
    alert('지원하지 않는 파일 형식입니다.\n이미지/문서 파일만 업로드 가능합니다.');
    event.target.value = '';
    return;
  }

  const fileBtn = document.getElementById('fileBtn');

  try {
    // 파일 업로드 중 표시
    fileBtn.disabled = true;
    fileBtn.textContent = '⏳';

    // S3에 업로드
    const fileUrl = await uploadFile(file);

    // 파일 메시지 전송 (WebSocket 연결 끊김 시 예외 발생)
    sendFileMessage(file.name, fileUrl);

    // 입력 초기화
    event.target.value = '';
  } catch (e) {
    alert('파일 업로드 실패: ' + e.message);
    event.target.value = '';
  } finally {
    // WebSocket 연결 상태에 따라 버튼 활성화
    fileBtn.disabled = !stompClient?.connected;
    fileBtn.textContent = '📎';
  }
}

async function uploadFile(file) {
  const formData = new FormData();
  formData.append('file', file);

  const res = await fetch('/api/files/chat', {
    method: 'POST',
    headers: { 'Authorization': token },
    body: formData
  });

  const data = await res.json();

  if (!res.ok) {
    throw new Error(data.message || `HTTP ${res.status}`);
  }

  return data.data.fileUrl;
}

function sendFileMessage(fileName, fileUrl) {
  if (!stompClient?.connected || !currentRoom) {
    throw new Error('채팅 연결이 끊어졌습니다. 다시 시도해주세요.');
  }

  stompClient.publish({
    destination: `/app/chat/${currentRoom.id}`,
    body: JSON.stringify({
      content: fileName,
      messageType: 'FILE',
      fileUrl: fileUrl
    })
  });
}

function appendRealtimeMsg(msg) {
  const listEl = document.getElementById('messageList');
  const el     = buildMsgEl(msg);
  listEl.appendChild(el);
  listEl.scrollTop = listEl.scrollHeight;
}

// ──────────────────────────────────────────
//  공통 API 헬퍼
// ──────────────────────────────────────────
async function api(url, method = 'GET', body = null, useToken = true) {
  const headers = { 'Content-Type': 'application/json' };
  // token은 서버에서 "Bearer eyJ..." 형태로 오므로 그대로 사용
  if (useToken && token) headers['Authorization'] = token;

  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);

  const res  = await fetch(url, opts);
  const data = await res.json();

  if (!res.ok) {
    throw new Error(data.message || `HTTP ${res.status}`);
  }
  return data;
}

// ──────────────────────────────────────────
//  유틸
// ──────────────────────────────────────────
/** 상대방이 읽음 이벤트를 보냈을 때 내 메시지 ✓ 실시간 업데이트 */
function markSentMessagesAsRead() {
  document.querySelectorAll('.msg-row.mine .msg-time').forEach(el => {
    if (!el.textContent.includes('✓')) {
      el.textContent = el.textContent.trim() + ' ✓';
    }
  });
}

/** 시스템 메시지(나가기 등) 표시 */
function appendSystemMsg(text) {
  const listEl = document.getElementById('messageList');
  const div = document.createElement('div');
  div.style.cssText = 'text-align:center;font-size:12px;color:#9ca3af;padding:10px 0;';
  div.textContent = text;
  listEl.appendChild(div);
  listEl.scrollTop = listEl.scrollHeight;
}

function clearUnreadBadge(roomId) {
  const item = document.querySelector(`.room-item[data-room-id="${roomId}"]`);
  if (!item) return;
  const badge = item.querySelector('.unread-badge');
  if (badge) badge.remove();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function formatTime(iso) {
  try {
    const d = new Date(iso);
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    return `${hh}:${mm}`;
  } catch { return ''; }
}

function escHtml(str) {
  return (str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/\n/g, '<br>');
}

function sanitizeFileUrl(raw) {
  try {
    const u = new URL(raw, location.origin);
    // http/https 스킴만 허용 (javascript:, data: 등 차단)
    if (!['http:', 'https:'].includes(u.protocol)) {
      return null;
    }
    return u.href;
  } catch {
    return null;
  }
}

// ──────────────────────────────────────────
//  한글 IME Enter 처리
//  macOS 이벤트 순서: keydown(isComposing=true) → compositionend → keyup(isComposing=false)
//  keydown: 항상 줄바꿈 방지만 수행 (전송 X)
//  keyup:   compositionend 이후에 발생하므로 isComposing=false일 때 전송
// ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const textarea = document.getElementById('msgInput');

  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault(); // 줄바꿈만 막음, 전송은 keyup에서
    }
  });

  textarea.addEventListener('keyup', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
      sendMessage(); // compositionend 이후라 마지막 조합 글자 중복 없음
    }
  });
});
