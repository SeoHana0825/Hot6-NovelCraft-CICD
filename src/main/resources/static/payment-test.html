<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 테스트 - NovelCraft</title>
  <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
    .container { max-width: 720px; margin: 40px auto; padding: 0 16px; }

    h1 { font-size: 22px; font-weight: 700; margin-bottom: 24px; color: #1a1a2e; }
    .card {
      background: #fff; border-radius: 12px; padding: 24px;
      margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card h2 {
      font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #444;
      border-bottom: 1px solid #eee; padding-bottom: 10px;
    }
    label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
    input[type="text"], input[type="number"], input[type="email"], input[type="password"] {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px; outline: none; transition: border-color .2s;
    }
    input:focus { border-color: #6c63ff; }
    .hint { font-size: 12px; color: #999; margin-top: 4px; }

    .amount-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
    .amount-btn {
      padding: 10px 0; background: #f5f5f5; border: 1px solid #ddd;
      border-radius: 8px; cursor: pointer; font-size: 14px; text-align: center;
      transition: background .15s, border-color .15s;
    }
    .amount-btn:hover { background: #ede9ff; border-color: #6c63ff; }
    .amount-btn.selected { background: #6c63ff; color: #fff; border-color: #6c63ff; }

    .form-row { margin-bottom: 14px; }
    .btn {
      width: 100%; padding: 13px; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: #6c63ff; color: #fff; }
    .btn-danger  { background: #ff4d4f; color: #fff; }
    .btn-secondary { background: #f5f5f5; color: #444; border: 1px solid #ddd; }

    /* 탭 */
    .tab-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab {
      flex: 1; padding: 10px; text-align: center; cursor: pointer;
      border-radius: 8px; font-size: 14px; font-weight: 600;
      border: 2px solid #ddd; background: #fff; color: #888; transition: all .15s;
    }
    .tab.active { border-color: #6c63ff; color: #6c63ff; background: #f3f0ff; }

    /* 섹션 토글 */
    .section { display: none; }
    .section.visible { display: block; }

    /* 유저 정보 바 */
    .user-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: #f3f0ff; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px;
    }
    .user-bar span { font-size: 14px; color: #6c63ff; font-weight: 600; }
    .btn-logout {
      padding: 6px 14px; background: #fff; border: 1px solid #ddd;
      border-radius: 6px; font-size: 13px; cursor: pointer; color: #666;
    }
    .btn-logout:hover { border-color: #ff4d4f; color: #ff4d4f; }

    /* 에러/성공 메시지 */
    .msg {
      border-radius: 8px; padding: 10px 14px; font-size: 13px;
      margin-bottom: 14px; display: none;
    }
    .msg.error   { background: #fff0f0; color: #e53935; border: 1px solid #ffcdd2; }
    .msg.success { background: #f0fff4; color: #2e7d32; border: 1px solid #c8e6c9; }

    /* 로그 */
    #log {
      background: #1e1e2e; color: #a6e3a1; border-radius: 10px;
      padding: 16px; font-family: monospace; font-size: 13px;
      max-height: 320px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
    }
    .log-entry { margin-bottom: 6px; line-height: 1.5; }
    .log-time    { color: #6c7086; }
    .log-error   { color: #f38ba8; }
    .log-success { color: #a6e3a1; }
    .log-info    { color: #89dceb; }
  </style>
</head>
<body>
<div class="container">
  <h1>NovelCraft 결제 테스트</h1>

  <!-- ── 비로그인 섹션 ── -->
  <div id="authSection" class="section">
    <div class="tab-row">
      <div class="tab active" id="tabLogin"  onclick="switchTab('login')">로그인</div>
      <div class="tab"        id="tabSignup" onclick="switchTab('signup')">회원가입</div>
    </div>

    <!-- 로그인 폼 -->
    <div id="loginForm" class="card">
      <h2>로그인</h2>
      <div class="msg error" id="loginError"></div>
      <div class="form-row">
        <label>이메일</label>
        <input type="email" id="loginEmail" placeholder="example@email.com" />
      </div>
      <div class="form-row">
        <label>비밀번호</label>
        <input type="password" id="loginPassword" placeholder="비밀번호 입력" />
      </div>
      <button class="btn btn-primary" id="loginBtn" onclick="login()">로그인</button>
    </div>

    <!-- 회원가입 폼 -->
    <div id="signupForm" class="card" style="display:none;">
      <h2>회원가입</h2>
      <div class="msg error"   id="signupError"></div>
      <div class="msg success" id="signupSuccess"></div>

      <!-- 1단계 -->
      <div id="signupStep1">
        <div class="form-row">
          <label>이메일</label>
          <input type="email" id="signupEmail" placeholder="example@email.com" />
        </div>
        <div class="form-row">
          <label>비밀번호 <span class="hint" style="display:inline">(8자 이상, 영문+숫자 포함)</span></label>
          <input type="password" id="signupPassword" placeholder="비밀번호 입력" />
        </div>
        <div class="form-row">
          <label>닉네임 <span class="hint" style="display:inline">(1~10자)</span></label>
          <input type="text" id="signupNickname" placeholder="닉네임 입력" />
        </div>
        <div class="form-row">
          <label>생년월일</label>
          <input type="text" id="signupBirthDay" placeholder="예: 1995-03-15" />
        </div>
        <div class="form-row">
          <label>휴대폰 번호</label>
          <input type="text" id="signupPhone" placeholder="예: 01012345678" />
        </div>
        <button class="btn btn-primary" id="signupStep1Btn" onclick="signupStep1()">다음 단계</button>
      </div>

      <!-- 2단계 -->
      <div id="signupStep2" style="display:none;">
        <p style="font-size:14px; color:#555; margin-bottom:16px;">기본 정보가 확인되었습니다. 독자로 가입합니다.</p>
        <button class="btn btn-primary" id="signupStep2Btn" onclick="signupStep2()">독자로 가입 완료</button>
        <button class="btn btn-secondary" style="margin-top:8px;" onclick="resetSignup()">다시 입력</button>
      </div>
    </div>
  </div>

  <!-- ── 로그인 후 결제 섹션 ── -->
  <div id="paySection" class="section">

    <!-- 유저 정보 바 -->
    <div class="user-bar">
      <span id="userInfo">로그인 중...</span>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>

    <!-- 포트원 설정 -->
    <div class="card">
      <h2>포트원 V2 설정</h2>
      <div class="form-row">
        <label>스토어 ID</label>
        <input type="text" id="storeId" value="store-6dd586c4-bbae-4fc5-a1b1-920f1850b300" />
      </div>
      <div class="form-row">
        <label>채널키</label>
        <input type="text" id="channelKey" value="channel-key-70f0f4c2-74c5-4c38-b275-c2c01e2c3660" />
      </div>
    </div>

    <!-- 포인트 충전 -->
    <div class="card">
      <h2>포인트 충전 (결제)</h2>
      <div class="form-row">
        <label>충전 금액 선택</label>
        <div class="amount-grid">
          <div class="amount-btn" data-amount="1000">1,000원</div>
          <div class="amount-btn" data-amount="3000">3,000원</div>
          <div class="amount-btn" data-amount="5000">5,000원</div>
          <div class="amount-btn" data-amount="10000">10,000원</div>
        </div>
        <input type="number" id="amount" placeholder="또는 직접 입력 (원)" min="100" step="100" />
      </div>
      <button class="btn btn-primary" onclick="startPayment()">결제하기</button>
    </div>

    <!-- 환불 -->
    <div class="card">
      <h2>환불 테스트</h2>
      <div class="form-row">
        <label>결제 DB ID (충전 성공 후 자동 입력됨)</label>
        <input type="number" id="paymentDbId" placeholder="예: 1" />
      </div>
      <div class="form-row">
        <label>환불 사유</label>
        <input type="text" id="cancelReason" value="단순 변심" />
      </div>
      <button class="btn btn-danger" onclick="cancelPayment()">환불하기</button>
    </div>

    <!-- 로그 -->
    <div class="card">
      <h2>요청 / 응답 로그</h2>
      <div id="log"><span class="log-info">로그가 여기에 출력됩니다.</span></div>
    </div>
  </div>
</div>

<script>
  // ──────────────────────────────────────────
  // 초기화: 토큰 유무로 섹션 분기
  // ──────────────────────────────────────────
  function init() {
    const token = localStorage.getItem('accessToken');
    if (token) {
      showPaySection();
    } else {
      document.getElementById('authSection').classList.add('visible');
    }
  }

  function showPaySection() {
    document.getElementById('authSection').classList.remove('visible');
    document.getElementById('paySection').classList.add('visible');
    const nickname = localStorage.getItem('userNickname') || '';
    const email    = localStorage.getItem('userEmail')    || '';
    document.getElementById('userInfo').textContent =
      `${nickname} (${email}) 님 환영합니다`;
  }

  // ──────────────────────────────────────────
  // 탭 전환
  // ──────────────────────────────────────────
  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabSignup').classList.toggle('active', !isLogin);
    document.getElementById('loginForm').style.display  = isLogin ? 'block' : 'none';
    document.getElementById('signupForm').style.display = isLogin ? 'none'  : 'block';
  }

  // ──────────────────────────────────────────
  // 로그인
  // ──────────────────────────────────────────
  async function login() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn      = document.getElementById('loginBtn');

    hideMsg('loginError');
    if (!email)    { showMsg('loginError', '이메일을 입력하세요.'); return; }
    if (!password) { showMsg('loginError', '비밀번호를 입력하세요.'); return; }

    btn.disabled = true; btn.textContent = '로그인 중...';
    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok || !data.data) {
        showMsg('loginError', data.message || '로그인에 실패했습니다.');
        return;
      }
      localStorage.setItem('accessToken',  data.data.accessToken);
      localStorage.setItem('refreshToken', data.data.refreshToken);
      localStorage.setItem('userEmail',    data.data.email);
      localStorage.setItem('userNickname', data.data.nickname);
      showPaySection();
    } catch (e) {
      showMsg('loginError', '서버에 연결할 수 없습니다.');
    } finally {
      btn.disabled = false; btn.textContent = '로그인';
    }
  }

  // ──────────────────────────────────────────
  // 회원가입 1단계
  // ──────────────────────────────────────────
  let tempToken = null;

  async function signupStep1() {
    const email    = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const nickname = document.getElementById('signupNickname').value.trim();
    const birthDay = document.getElementById('signupBirthDay').value.trim();
    const phoneNo  = document.getElementById('signupPhone').value.trim();
    const btn      = document.getElementById('signupStep1Btn');

    hideMsg('signupError'); hideMsg('signupSuccess');
    if (!email || !password || !nickname || !birthDay || !phoneNo) {
      showMsg('signupError', '모든 항목을 입력하세요.'); return;
    }

    btn.disabled = true; btn.textContent = '확인 중...';
    try {
      const res  = await fetch('/api/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, nickname, birthDay, phoneNo })
      });
      const data = await res.json();
      if (!res.ok || !data.data) {
        showMsg('signupError', data.message || '회원가입에 실패했습니다.');
        return;
      }
      tempToken = data.data.tempToken;
      document.getElementById('signupStep1').style.display = 'none';
      document.getElementById('signupStep2').style.display = 'block';
    } catch (e) {
      showMsg('signupError', '서버에 연결할 수 없습니다.');
    } finally {
      btn.disabled = false; btn.textContent = '다음 단계';
    }
  }

  // ──────────────────────────────────────────
  // 회원가입 2단계 (독자)
  // ──────────────────────────────────────────
  async function signupStep2() {
    const btn = document.getElementById('signupStep2Btn');
    hideMsg('signupError'); hideMsg('signupSuccess');

    btn.disabled = true; btn.textContent = '가입 중...';
    try {
      const res  = await fetch('/api/auth/signup/reader', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': tempToken
        },
        body: JSON.stringify({
          preferredGenres: ['ROMANCE_FANTASY'],
          notifyNewNovel: false,
          notifyEvent: false
        })
      });
      const data = await res.json();
      if (!res.ok) {
        showMsg('signupError', data.message || '가입에 실패했습니다.');
        return;
      }
      showMsg('signupSuccess', '회원가입이 완료되었습니다! 로그인해주세요.');
      tempToken = null;
      setTimeout(() => {
        resetSignup();
        switchTab('login');
      }, 1500);
    } catch (e) {
      showMsg('signupError', '서버에 연결할 수 없습니다.');
    } finally {
      btn.disabled = false; btn.textContent = '독자로 가입 완료';
    }
  }

  function resetSignup() {
    tempToken = null;
    document.getElementById('signupStep1').style.display = 'block';
    document.getElementById('signupStep2').style.display = 'none';
    hideMsg('signupError'); hideMsg('signupSuccess');
  }

  // ──────────────────────────────────────────
  // 로그아웃
  // ──────────────────────────────────────────
  function logout() {
    localStorage.removeItem('accessToken');
    localStorage.removeItem('refreshToken');
    localStorage.removeItem('userEmail');
    localStorage.removeItem('userNickname');
    document.getElementById('paySection').classList.remove('visible');
    document.getElementById('authSection').classList.add('visible');
    switchTab('login');
  }

  // ──────────────────────────────────────────
  // 인증 헤더 반환 (Silent Refresh 포함)
  // ──────────────────────────────────────────
  function authHeaders() {
    return {
      'Content-Type': 'application/json',
      'Authorization': localStorage.getItem('accessToken') || ''
    };
  }

  // ──────────────────────────────────────────
  // 금액 버튼 선택
  // ──────────────────────────────────────────
  document.querySelectorAll('.amount-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('amount').value = btn.dataset.amount;
    });
  });

  // ──────────────────────────────────────────
  // 포트원 V2 결제
  // ──────────────────────────────────────────
  async function startPayment() {
    const token = localStorage.getItem('accessToken');
    if (!token) { logout(); return; }

    const amount     = Number(document.getElementById('amount').value);
    const storeId    = document.getElementById('storeId').value.trim();
    const channelKey = document.getElementById('channelKey').value.trim();

    if (!amount || amount < 100) { alert('100원 이상의 금액을 입력하세요.'); return; }
    if (!storeId)    { alert('스토어 ID를 입력하세요.'); return; }
    if (!channelKey) { alert('채널키를 입력하세요.'); return; }

    // 1단계: 결제창 열기 전 서버에 PENDING Payment 미리 생성
    //        → 결제 도중 토큰이 만료되어도 웹훅으로 포인트 충전이 보장됨
    log(`결제 준비 중... (서버에 결제 사전 등록)`);
    let paymentKey;
    try {
      const prepRes  = await fetch('/api/payments/prepare', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ amount })
      });
      const prepData = await prepRes.json();

      if (prepRes.status === 401) { log('인증이 만료되었습니다. 다시 로그인하세요.', 'error'); logout(); return; }
      if (!prepRes.ok) { log(`결제 준비 실패: ${prepData.message}`, 'error'); return; }

      paymentKey = prepData.data.paymentKey;
      log(`결제 준비 완료 → paymentKey: ${paymentKey}`, 'success');
    } catch (e) {
      log(`결제 준비 중 오류: ${e.message}`, 'error');
      return;
    }

    // 2단계: 서버가 생성한 paymentKey로 포트원 결제창 열기
    log(`결제창 열기 → amount: ${amount}원`);
    try {
      const response = await PortOne.requestPayment({
        storeId, channelKey,
        paymentId: paymentKey,
        orderName: `NovelCraft 포인트 ${amount.toLocaleString()}P 충전`,
        totalAmount: amount,
        currency: 'CURRENCY_KRW',
        payMethod: 'CARD',
        customer: {
          fullName: localStorage.getItem('userNickname') || '테스트 사용자',
          email: localStorage.getItem('userEmail') || 'test@novelcraft.com',
          phoneNumber: '01012345678',
        }
      });

      if (response?.code) {
        log(`결제 실패: [${response.code}] ${response.message}`, 'error');
        return;
      }

      log(`포트원 결제 완료 → paymentId: ${response.paymentId}`, 'success');

      // 3단계: /confirm 호출 (토큰이 살아있으면 즉시 처리, 만료됐으면 웹훅이 보정)
      log(`서버 검증 중...`);
      const res  = await fetch('/api/payments/confirm', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ paymentId: response.paymentId, amount })
      });
      const data = await res.json();

      if (res.status === 401) {
        log('토큰이 만료되었습니다. 포트원 웹훅이 자동으로 포인트를 충전합니다.', 'info');
        log('잠시 후 포인트가 충전됩니다. 다시 로그인 후 확인하세요.');
        return;
      }

      if (data.success) {
        log(`충전 완료! DB paymentId: ${data.data.paymentId}, 충전액: ${data.data.amount.toLocaleString()}P`, 'success');
        document.getElementById('paymentDbId').value = data.data.paymentId;
      } else {
        log(`서버 오류: ${data.message}`, 'error');
      }
    } catch (e) {
      log(`오류: ${e.message}`, 'error');
    }
  }

  // ──────────────────────────────────────────
  // 환불
  // ──────────────────────────────────────────
  async function cancelPayment() {
    const token     = localStorage.getItem('accessToken');
    if (!token) { logout(); return; }

    const paymentId = document.getElementById('paymentDbId').value;
    const reason    = document.getElementById('cancelReason').value;

    if (!paymentId) { alert('결제 DB ID를 입력하세요.'); return; }
    if (!reason.trim()) { alert('환불 사유를 입력하세요.'); return; }

    log(`환불 요청 → paymentId: ${paymentId}, reason: ${reason}`);

    try {
      const res  = await fetch(`/api/payments/${paymentId}/cancel`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ reason })
      });
      const data = await res.json();

      if (res.status === 401) { log('인증이 만료되었습니다. 다시 로그인하세요.', 'error'); logout(); return; }

      if (data.success) {
        log(`환불 완료! 상태: ${data.data.status}`, 'success');
      } else {
        log(`환불 실패: ${data.message}`, 'error');
      }
    } catch (e) {
      log(`네트워크 오류: ${e.message}`, 'error');
    }
  }

  // ──────────────────────────────────────────
  // 유틸
  // ──────────────────────────────────────────
  function log(msg, type = 'info') {
    const el   = document.getElementById('log');
    const time = new Date().toLocaleTimeString();
    const div  = document.createElement('div');
    div.className = `log-entry log-${type}`;
    div.innerHTML = `<span class="log-time">[${time}]</span> ${escapeHtml(msg)}`;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showMsg(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideMsg(id) {
    document.getElementById(id).style.display = 'none';
  }

  // 시작
  init();
</script>
</body>
</html>
